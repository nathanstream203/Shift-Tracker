<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shift Time Tracker</title>
  <link rel="stylesheet" href="time-tracker.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="header-row">
        <div>
          <h1>Shift time tracker</h1>
          <p class="subtitle">Know exactly when to clock out</p>
        </div>
        <div class="header-actions">
          <button id="reset-btn" onclick="resetAll()" title="Clear today's data">
            Reset day
          </button>
          <button id="close-btn" onclick="window.electronAPI?.closeWindow()" title="Close">✕</button>
        </div>
      </div>
    </header>

    <div id="live-area"></div>

    <div class="card">
      <p class="section-title">Clock events</p>

      <div class="row">
        <label class="label" for="in1">Morning clock-in</label>
        <div class="input-group">
          <button class="stamp-btn" onclick="stampNow('in1')" title="Stamp current time">Now</button>
          <input type="time" id="in1" oninput="calc()" />
          <button class="clear-btn" onclick="clearField('in1')" title="Clear">✕</button>
        </div>
      </div>
      <div class="row">
        <label class="label" for="out1">
          Lunch clock-out
          <span class="badge">unpaid</span>
        </label>
        <div class="input-group">
          <button class="stamp-btn" onclick="stampNow('out1')" title="Stamp current time">Now</button>
          <input type="time" id="out1" oninput="calc()" />
          <button class="clear-btn" onclick="clearField('out1')" title="Clear">✕</button>
        </div>
      </div>
      <div class="row">
        <label class="label" for="in2">Lunch clock-in</label>
        <div class="input-group">
          <button class="stamp-btn" onclick="stampNow('in2')" title="Stamp current time">Now</button>
          <input type="time" id="in2" oninput="calc()" />
          <button class="clear-btn" onclick="clearField('in2')" title="Clear">✕</button>
        </div>
      </div>

      <hr class="divider" />
      <p class="section-title">Goal</p>

      <div class="row">
        <label class="label" for="goal">Target paid hours</label>
        <div class="goal-input">
          <input type="number" id="goal" value="8" min="1" max="24" step="0.5" oninput="calc()" />
          <span class="unit">hrs</span>
        </div>
      </div>
    </div>

    <div id="result-area">
      <div class="result">
        <p class="empty">Enter your morning clock-in time to get started</p>
      </div>
    </div>
  </div>

  <script src="time-tracker.js"></script>
  <script>
    // Handle hide-window from main process (blur event)
    // Also wire up close button via preload if running in Electron
    if (window.electronAPI) {
      document.getElementById('close-btn').style.display = 'flex';
    }
  </script>
</body>
</html>
